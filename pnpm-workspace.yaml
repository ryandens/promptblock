# Supply-chain guard: don't install any package version until it has been
# public for at least 1 day (1440 minutes). This blunts fast-moving npm
# account-compromise campaigns that rely on installs happening within hours
# of a malicious publish. A short window is acceptable here because Socket
# (https://socket.dev) independently scans dependencies for malicious
# behavior. See https://pnpm.io/settings#minimumreleaseage
minimumReleaseAge: 1440

# Build-script policy (pnpm 11 `allowBuilds`). Every value is `false`: no
# dependency may run install/build scripts. onnxruntime-node and sharp ship
# native binaries via install scripts, but we deliberately skip them so the ML
# classifier falls back to the pure-WASM onnxruntime-web runtime — no native
# code is fetched or executed. `false` also suppresses ERR_PNPM_IGNORED_BUILDS.
allowBuilds:
  onnxruntime-node: false
  protobufjs: false
  sharp: false
