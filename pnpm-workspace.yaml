# Supply-chain guard: don't install any package version until it has been
# public for at least 5 days (7200 minutes). This blunts fast-moving npm
# account-compromise campaigns that rely on installs happening within hours
# of a malicious publish. See https://pnpm.io/settings#minimumreleaseage
minimumReleaseAge: 7200

# No dependency is allowed to run install/build scripts. Tests run on Node's
# built-in TypeScript support, so the tree carries no packages that need one.
onlyBuiltDependencies: []
