name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Reads the pnpm version from the "packageManager" field in package.json.
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      # Socket Firewall: routes package downloads through a local proxy that
      # blocks known-malicious packages at install time. No API key needed.
      - uses: socketdev/action@ba6de6cc0565af1f42295590380973573297e31f # v1.3.2
        with:
          mode: firewall-free
      # `sfw` wraps the package manager so the install goes through the firewall.
      - run: sfw pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run build
      - run: pnpm test

  # Lints the GitHub Actions workflow files themselves.
  # https://github.com/rhysd/actionlint/blob/main/docs/usage.md#use-actionlint-on-github-actions
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # The actionlint version and the download script's pinned commit are both
      # kept up to date by Renovate — see the customManagers in renovate.json.
      - name: Download actionlint
        id: get_actionlint
        # renovate: datasource=github-releases depName=rhysd/actionlint
        env:
          ACTIONLINT_VERSION: 1.7.11
        run: bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/011a6d15e749bb3f2d771eed9c7aa0e7e3e10ee7/scripts/download-actionlint.bash) "$ACTIONLINT_VERSION"
        shell: bash
      - name: Check workflow files
        run: ${{ steps.get_actionlint.outputs.executable }} -color
        shell: bash
